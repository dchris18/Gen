<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page 1</title>
    <link rel="stylesheet" href="./page1.css" />
  </head>
  <body>
    <main class="screen">
      <section class="top-tools">
        <button class="tool-card" aria-label="Pot">
          <img src="../photos/Pot.png" alt="Pot" />
        </button>
        <button class="tool-card" aria-label="Shears">
          <img src="../photos/Shears.png" alt="Shears" />
        </button>
      </section>

      <section class="garden-grid">
        <button class="plot filled" aria-label="Onion plot">
          <img src="../photos/OnionPlant.png" alt="Onion plant" />
        </button>

        <button class="plot filled" aria-label="Potato plot">
          <img src="../photos/PotatoPlant.png" alt="Potato plant" />
        </button>

        <button class="plot filled" aria-label="Carrot plot">
          <img src="../photos/CarrotPlant.png" alt="Carrot plant" />
        </button>

        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>

        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>

        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
        <button class="plot" aria-label="Empty plot"></button>
      </section>

      <div class="plant-popup" id="plantPopup">
        <div class="popup-oval">
          <img id="popupImage" src="" alt="" />
        </div>

        <div class="popup-text">
          <h3 id="popupTitle">Plant</h3>
          <p class="popup-season">Spring</p>
          <p id="popupDesc">Plant in spring to grow something nice.</p>
        </div>
      </div>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <a class="nav-btn back" href="../index.html" aria-label="Back">
          <img src="../photos/Back.png" alt="Back" />
        </a>
        <a class="nav-btn bell" href="#" aria-label="Notifications">
          <img src="../photos/Bell.png" alt="Bell" />
        </a>
        <a class="nav-btn home" href="./index.html" aria-label="Home">
          <img src="../photos/Home.png" alt="Home" />
        </a>
        <a class="nav-btn chat" href="#" aria-label="Chat">
          <img src="../photos/Chat.png" alt="Chat" />
        </a>
      </nav>
    </main>

    <script src="./page1.js"></script>
  </body>
</html>
