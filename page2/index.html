<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page 2</title>
    <link rel="stylesheet" href="./page2.css" />
  </head>

  <body>
    <main class="screen">
      <section class="planner-board" aria-label="Garden planner board">
        <div id="three-platform"></div>

        <button class="bookmark-button" aria-label="Bookmark">
          <img src="../photos/Bookmark.png" alt="Bookmark" />
        </button>

        <button class="save-button" aria-label="Save">
          <img src="../photos/Save.png" alt="Save" />
        </button>

<button class="rewind-button" aria-label="Undo">
  <img src="../photos/Rewind.png" alt="Undo" />
</button>

        <button class="eye-button" aria-label="Edit grid size">
          <svg viewBox="0 0 120 70" class="eye-icon" aria-hidden="true">
            <path
              d="M8 35C20 20 37 10 60 10C83 10 100 20 112 35C100 50 83 60 60 60C37 60 20 50 8 35Z"
              fill="#ece8c9"
            />
            <circle cx="60" cy="35" r="18" fill="#8f765d" />
            <circle cx="54" cy="29" r="8" fill="#ece8c9" opacity="0.95" />
          </svg>
        </button>

        <div class="grid-menu">
          <button data-grid="3">3x3</button>
          <button data-grid="6">6x6</button>
          <button data-grid="9">9x9</button>
        </div>
      </section>

<div class="plant-menu">
  <h2>Choose Plant</h2>

  <button class="plant-category-btn" data-category="greenery">Greenery</button>
  <div class="plant-category-list" data-list="greenery">
    <button class="plant-card" data-plant="fern"><span>Fern</span></button>
    <button class="plant-card" data-plant="sprout"><span>Sprout</span></button>
    <button class="plant-card" data-plant="clover"><span>Clover</span></button>
    <button class="plant-card" data-plant="hosta"><span>Hosta</span></button>
    <button class="plant-card" data-plant="grass"><span>Spring Grass</span></button>
  </div>

  <button class="plant-category-btn" data-category="flowers">Flowers</button>
  <div class="plant-category-list" data-list="flowers">
    <button class="plant-card" data-plant="flower"><span>Pink Flower</span></button>
    <button class="plant-card" data-plant="daffodil"><span>Daffodil</span></button>
    <button class="plant-card" data-plant="iris"><span>Iris</span></button>
    <button class="plant-card" data-plant="tulip"><span>Tulip</span></button>
    <button class="plant-card" data-plant="dogwood"><span>Dogwood</span></button>
  </div>

  <button class="plant-category-btn" data-category="crops">Crops</button>
  <div class="plant-category-list" data-list="crops">
    <button class="plant-card" data-plant="tomato"><span>Tomato</span></button>
    <button class="plant-card" data-plant="carrot"><span>Carrot</span></button>
    <button class="plant-card" data-plant="potato"><span>Potato</span></button>
    <button class="plant-card" data-plant="strawberry"><span>Strawberry</span></button>
    <button class="plant-card" data-plant="lettuce"><span>Lettuce</span></button>
    <button class="plant-card" data-plant="peas"><span>Peas</span></button>
    <button class="plant-card" data-plant="radish"><span>Radish</span></button>
  </div>
</div>

      <div class="remove-popup">
        <h2>Remove Tile</h2>
        <div class="remove-actions">
          <button class="back-remove">Back</button>
          <button class="confirm-remove">Confirm</button>
        </div>
      </div>

      <div class="name-save-popup">
        <h2>Name Save</h2>
        <input class="save-name-input" type="text" placeholder="Garden name" />
        <div class="remove-actions">
          <button class="cancel-save">Back</button>
          <button class="confirm-save">Save</button>
        </div>
      </div>

      <div class="saved-list-popup">
        <h2>Saved Gardens</h2>
        <div class="saved-list"></div>
        <button class="close-saves">Back</button>
      </div>

      <div class="tool-row">
        <button class="tool-btn tool-trowel" aria-label="Add Tile">
          <img src="../photos/Add.png" alt="Add Tile" />
        </button>

        <button class="tool-btn tool-pot" aria-label="Pot">
          <img src="../photos/Pot.png" alt="Pot" />
        </button>

        <button class="tool-btn tool-shears" aria-label="Remove">
          <img src="../photos/Remove.png" alt="Remove" />
        </button>
      </div>
    </main>

    <script type="module" src="./page2.js"></script>
  </body>
</html>
