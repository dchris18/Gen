<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page 2</title>
<link rel="stylesheet" href="./page2.css" />
  </head>

  <body>
    <main class="screen">
      <div class="title-pill">
        <h1 class="title">Plan Your Garden</h1>
      </div>

      <section class="planner-board" aria-label="Garden planner board">
        <div id="three-platform"></div>

        <button class="eye-button" aria-label="Preview garden">
          <svg viewBox="0 0 120 70" class="eye-icon" aria-hidden="true">
            <path
              d="M8 35C20 20 37 10 60 10C83 10 100 20 112 35C100 50 83 60 60 60C37 60 20 50 8 35Z"
              fill="#ece8c9"
            />
            <circle cx="60" cy="35" r="18" fill="#8f765d" />
            <circle cx="54" cy="29" r="8" fill="#ece8c9" opacity="0.95" />
          </svg>
        </button>
      </section>

      <div class="tool-row">
        <button class="tool-btn tool-trowel" aria-label="Trowel">
          <img src="../photos/Trowel.png" alt="Trowel" />
        </button>

        <button class="tool-btn tool-pot" aria-label="Pot">
          <img src="../photos/Pot.png" alt="Pot" />
        </button>

        <button class="tool-btn tool-shears" aria-label="Shears">
          <img src="../photos/Shears.png" alt="Shears" />
        </button>
      </div>
    </main>

<script type="module" src="./page2.js"></script>
  </body>
</html>
